<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Attendance Settings (Native Android)</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 24px;
      background: #0f172a;
      color: #f1f5f9;
      margin: 0;
    }
    h2 { margin-top: 40px; font-size: 24px; font-weight: 600; color: #fff; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-size: 15px; font-weight: 500; color: #94a3b8; }
    input {
      width: 100%;
      padding: 14px;
      background: #1e293b;
      border: 1px solid #334155;
      color: #fff;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 16px;
    }
    input:focus { outline: none; border-color: #6366f1; }
    button {
      width: 100%;
      margin-top: 30px;
      padding: 16px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
    }
    .status { margin-top: 16px; font-size: 15px; color: #10b981; display: none; text-align: center; }
  </style>
</head>
<body>
  <h2>Android Settings</h2>
  
  <div class="form-group">
    <label>API Base URL</label>
    <input type="text" id="apiBase" placeholder="https://creativlab.in/api" />
  </div>
  
  <div class="form-group">
    <label>Office Wi-Fi SSID</label>
    <input type="text" id="officeSSID" placeholder="Enter exactly as it appears in Wi-Fi list" />
  </div>
  
  <div class="form-group">
    <label>Device Fingerprint</label>
    <input type="text" id="deviceFingerprint" placeholder="Unique identifier for this device" />
  </div>
  
  <button id="saveBtn">Save Configuration</button>
  <div id="status" class="status">Settings saved successfully!</div>
  
  <script>
    // Capacitor injects window.Capacitor automatically when bundled
    async function init() {
      if (window.Capacitor && window.Capacitor.Plugins.BackgroundService) {
        const { BackgroundService } = window.Capacitor.Plugins;
        const res = await BackgroundService.getPrefs();
        document.getElementById('apiBase').value = res.apiBase || 'https://creativlab.in/api';
        document.getElementById('officeSSID').value = res.officeSSID || '';
        document.getElementById('deviceFingerprint').value = res.deviceFingerprint || '';
        
        // Start background service on load if not running
        await BackgroundService.start();
      }
    }

    document.getElementById('saveBtn').addEventListener('click', async () => {
      if (window.Capacitor && window.Capacitor.Plugins.BackgroundService) {
        const { BackgroundService } = window.Capacitor.Plugins;
        const btn = document.getElementById('saveBtn');
        const status = document.getElementById('status');
        
        btn.disabled = true;
        btn.textContent = 'Saving...';
        
        await BackgroundService.savePrefs({
          apiBase: document.getElementById('apiBase').value,
          officeSSID: document.getElementById('officeSSID').value,
          deviceFingerprint: document.getElementById('deviceFingerprint').value
        });
        
        // Restart service to pick up new prefs
        await BackgroundService.stop();
        await BackgroundService.start();
        
        status.style.display = 'block';
        btn.textContent = 'Save Configuration';
        btn.disabled = false;
        
        setTimeout(() => {
          status.style.display = 'none';
        }, 3000);
      } else {
        alert("Capacitor BackgroundService not available");
      }
    });

    document.addEventListener("DOMContentLoaded", init);
  </script>
</body>
</html>
